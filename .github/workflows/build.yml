name: 打包去水印工具

on:
  push:
    tags:
      - "v*"  # 推送 v1.0, v1.1 等标签时自动打包
  workflow_dispatch:  # 也可以手动触发

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install opencv-python numpy

      - name: 打包 Windows exe
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --name "豆包去水印" ^
            --add-data "delogo_gui.py;." delogo_gui.py
          # 也打包命令行版
          pyinstaller --onefile --name "delogo" delogo.py

      - name: 打包 macOS dmg
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --name "豆包去水印" \
            delogo_gui.py
          pyinstaller --onefile --name "delogo" delogo.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 去水印工具-${{ runner.os }}
          path: |
            dist/豆包去水印*
            dist/delogo*
