name: 打包去水印工具

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller opencv-python numpy

      - name: 打包 (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          pyinstaller --onefile --windowed --name "豆包去水印" delogo_gui.py
          pyinstaller --onefile --name "delogo" delogo.py

      - name: 打包 (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --name "豆包去水印" delogo_gui.py
          pyinstaller --onefile --name "delogo" delogo.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 去水印工具-${{ runner.os }}
          path: |
            dist/豆包去水印*
            dist/delogo*
